        }

        }
        .result-list { 
            list-style-type: none; 
            padding: 0; 
            margin: 0; 
        }
        .result-item { 
            background-color: #1e1e1e; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            font-size: 18px;
        }
        .prefix { 
            font-weight: bold; 
            color: #00e676; 
            margin-right: 15px; 
            min-width: 50px;
        }
        .words { 
            flex-grow: 1; 
            word-break: keep-all; 
            color: #fff;
        }
        .empty-msg {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
    </style>
</head>

        // 데이터를 사용하기 좋게 배열로 정제합니다.
        const dataList = rawData.split('\n')
            .map(line => line.trim())
            .filter(line => line.length > 0 && line.indexOf(' ') !== -1)
            .map(line => {
                const firstSpaceIdx = line.indexOf(' ');
                return {
                    prefix: line.substring(0, firstSpaceIdx).trim(),
                    words: line.substring(firstSpaceIdx + 1).trim()
                };
            });

        const searchInput = document.getElementById('searchInput');
        const resultList = document.getElementById('resultList');

        // 검색 함수
        function renderResults(query) {
            resultList.innerHTML = '';
            
            // 공백을 무시하여 'ㅂ ㅂ ㄹ ㅍ' 처럼 쳐도 'ㅂㅂㄹㅍ'으로 인식하게 처리
            const lowerQuery = query.toLowerCase().replace(/\s/g, ''); 

            if (lowerQuery.length === 0) {
                resultList.innerHTML = '<div class="empty-msg">검색어를 입력하면 결과가 나타납니다.</div>';
                return;
            }

            // 조건 1: 사용자가 입력한 문자열이 주제+초성(prefix)에 포함되는가? (예: 과ㅅㄱ)
            // 조건 2: 사용자가 입력한 문자열이 단어 자체에 포함되는가? (예: 사과)
            const filtered = dataList.filter(item => {
                return item.prefix.includes(lowerQuery) || item.words.includes(query);
            });

            filtered.sort((a, b) => {
    const lenA = a.prefix.replace(/\s/g, '').length;
    const lenB = b.prefix.replace(/\s/g, '').length;
    
    if (lenA === lenB) {
        return a.prefix.localeCompare(b.prefix); 
    }
    return lenA - lenB; 
});

            if (filtered.length === 0) {
                resultList.innerHTML = '<div class="empty-msg">일치하는 단어가 없습니다.</div>';
                return;
            }

            // 결과 화면에 그리기
            filtered.forEach(item => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `<span class="prefix">${item.prefix}</span><span class="words">${item.words}</span>`;
                resultList.appendChild(li);
            });
        }

        // 입력할 때마다 실시간으로 반응
        searchInput.addEventListener('input', (e) => {
            renderResults(e.target.value);
        });
