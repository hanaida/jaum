<style>

margin: 0; 
}
.container { 
max-width: 600px; 
margin: 0 auto; 
}
h1 { 
text-align: center; 
color: #00e676; 
margin-bottom: 5px;
}
.subtitle {
text-align: center;
color: #888;
font-size: 14px;
margin-bottom: 25px;
}
/* 새 단어 추가 폼 디자인 */
.add-form {
background-color: #1e1e1e;
padding: 15px;
border-radius: 8px;
margin-top: 40px; 
display: flex;
gap: 10px;
flex-wrap: wrap;
border: 1px solid #333;
}
.section-title {
width: 100%;
font-size: 14px;
color: #00e676;
font-weight: bold;
margin-bottom: 5px;
}
.add-form input, .add-form select {
flex: 1;
padding: 10px;
background-color: #2a2a2a;
border: 1px solid #444;
color: #fff;
border-radius: 4px;
min-width: 100px;
outline: none;
box-sizing: border-box;
}

#addNickname, #addPrefix, #addWord { 
flex-basis: 100%;
}
#addCategory {
flex: 2; 
}

.add-form input:focus, .add-form select:focus {
border-color: #00e676;
}
.add-form button {
flex: 1; 
padding: 10px 20px;
background-color: #00e676;
color: #121212;
border: none;
font-weight: bold;
border-radius: 4px;
cursor: pointer;
transition: background-color 0.2s;
}
.add-form button:hover {
background-color: #00c853;
}
/* 검색창 및 결과 리스트 디자인 */
.search-box { 
width: 100%; 
padding: 15px; 
font-size: 20px; 
font-weight: bold;
border: 2px solid #333; 
border-radius: 8px; 
background-color: #1e1e1e; 
color: #fff; 
margin-bottom: 20px; 
box-sizing: border-box; 
outline: none; 
transition: border-color 0.2s;
}
.search-box:focus { border-color: #00e676; }
.result-list { 
list-style-type: none; 
padding: 0; 
margin: 0; 
margin-bottom: 20px;
}
.result-item { 
background-color: #1e1e1e; padding: 15px; margin-bottom: 10px; 
border-radius: 8px; display: flex; align-items: center; font-size: 18px;
}
.prefix { font-weight: bold; color: #00e676; margin-right: 15px; min-width: 50px; }
.words { flex-grow: 1; word-break: keep-all; color: #fff; }
.category {
font-size: 13px; color: #aaa; background-color: #2a2a2a;
padding: 4px 8px; border-radius: 6px; margin-left: 10px; border: 1px solid #444;
white-space: nowrap;
}
.category.user-added {
color: #00e676;
border-color: #00e676;
background-color: rgba(0, 230, 118, 0.1);
font-weight: bold;
}
.empty-msg { text-align: center; color: #666; margin-top: 20px; }

/* 랭킹 컨테이너 디자인 */
.ranking-container {
background-color: #1e1e1e;
padding: 15px;
border-radius: 8px;
margin-top: 20px;
border: 1px solid #333;
}
.ranking-title {
text-align: center;
color: #00e676;
font-size: 14px;
font-weight: bold;
margin-bottom: 15px;
}
.ranking-list {
list-style: none;
padding: 0;
margin: 0;
}
.ranking-item {
display: flex;
justify-content: space-between;
padding: 8px 10px;
border-bottom: 1px solid #333;
color: #e0e0e0;
font-size: 15px;
cursor: pointer; /* 🚀 클릭 가능한 요소임을 나타내는 마우스 커서 */
transition: background-color 0.2s;
}
.ranking-item:hover {
background-color: #2a2a2a; /* 🚀 마우스 올렸을 때 살짝 밝아짐 */
border-radius: 4px;
}
.ranking-item:last-child {
border-bottom: none;
}
.ranking-rank {
font-weight: bold;
width: 30px;
text-align: center;
margin-right: 10px;
}
.ranking-name {
flex-grow: 1;
}
.ranking-count {
color: #00e676;
font-weight: bold;
}

/* 🚀 팝업(모달) 스타일 추가 */
.modal-overlay {
display: none; 
position: fixed; top: 0; left: 0; width: 100%; height: 100%;
background-color: rgba(0, 0, 0, 0.7); 
z-index: 1000; 
justify-content: center; align-items: center;
}
.modal-content {
background-color: #1e1e1e; 
padding: 20px; border-radius: 12px; border: 1px solid #444;
width: 90%; max-width: 400px; max-height: 70vh; 
display: flex; flex-direction: column;
}
.modal-header {
display: flex; justify-content: space-between; align-items: center;
border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px;
}
.modal-title { font-size: 16px; font-weight: bold; color: #00e676; }
.close-btn { 
background: none; border: none; color: #888; font-size: 24px; cursor: pointer; 
}
.close-btn:hover { color: #fff; }
.modal-body {
overflow-y: auto; /* 내용이 길면 스크롤 */
padding-right: 5px;
}
.modal-list { list-style: none; padding: 0; margin: 0; }
.modal-item {
display: flex; justify-content: space-between; align-items: center;
padding: 10px 0; border-bottom: 1px solid #2a2a2a;
}
.modal-item:last-child { border-bottom: none; }

const dataMap = new Map();
const userCounts = new Map(); 
let anonymousCount = 0; // 🚀 새로 추가된 익명 카운트 변수

function getPriority(category, isUser, nickname) {
    if (isUser && nickname === "갱생짐인") return 4;
    if (isUser) return 1;
    if (category === "기타") return 2;
    return 3;                  
}

function addOrUpdateWord(prefix, word, category, isUser = false, nickname = "") {
    const uniqueKey = prefix + "_" + word;
    const newPriority = getPriority(category, isUser, nickname);

    if (dataMap.has(uniqueKey)) {
        const existingData = dataMap.get(uniqueKey);
        const existingPriority = getPriority(existingData.category, existingData.isUser, existingData.nickname);
        
        if (newPriority >= existingPriority) {
            dataMap.set(uniqueKey, { prefix, words: word, category, isUser, nickname });
        }
    } else {
        dataMap.set(uniqueKey, { prefix, words: word, category, isUser, nickname });
    }
}

// 🚀 모달 열기 함수
function openUserModal(nickname) {
    const modalTitle = document.getElementById('modalTitle');
    const modalList = document.getElementById('modalList');
    
    // 익명일 경우 타이틀 변경
    if(nickname === "익명") {
        modalTitle.innerText = `익명`;
    } else {
        modalTitle.innerText = `${nickname}님이 추가한 단어`;
    }
    
    modalList.innerHTML = ''; 

    const userWords = dataList.filter(item => item.isUser && item.nickname === nickname);

    userWords.forEach(item => {
        const li = document.createElement('li');
        li.className = 'modal-item';
        li.innerHTML = `
            <div>
                <span class="prefix" style="min-width:auto; margin-right:8px;">${item.prefix}</span>
                <span class="words" style="font-size:16px;">${item.words}</span>
            </div>
            <span class="category user-added">${item.category}</span>
        `;
        modalList.appendChild(li);
    });

    document.getElementById('userModal').style.display = 'flex';
}

// 모달 닫기 이벤트 (X 버튼 또는 바깥 배경 클릭 시)
document.getElementById('closeModalBtn').addEventListener('click', () => {
    document.getElementById('userModal').style.display = 'none';
});
document.getElementById('userModal').addEventListener('click', (e) => {
    if(e.target === document.getElementById('userModal')) {
        document.getElementById('userModal').style.display = 'none';
    }
});

function updateRankingUI() {
    const rankingList = document.getElementById('rankingList');
    rankingList.innerHTML = '';

    const sortedUsers = Array.from(userCounts.entries())
                             .sort((a, b) => b[1] - a[1])
                             .slice(0, 5);

    if (sortedUsers.length === 0 && anonymousCount === 0) {
        rankingList.innerHTML = '<li class="ranking-item" style="justify-content:center; color:#666; cursor:default;">아직 등록된 랭킹이 없습니다.</li>';
        return;
    }

    // Top 5 랭킹 출력
    sortedUsers.forEach((user, index) => {
        const [nickname, count] = user;
        const li = document.createElement('li');
        li.className = 'ranking-item';
        
        let rankDisplay = `${index + 1}위`;

        li.innerHTML = `
            <div>
                <span class="ranking-rank">${rankDisplay}</span>
                <span class="ranking-name">${nickname}</span>
            </div>
            <span class="ranking-count">${count}개</span>
        `;
        
        li.addEventListener('click', () => openUserModal(nickname));
        rankingList.appendChild(li);
    });

    // 익명 기여자 횟수 출력 (이모티콘 없이 깔끔하게 표시)
    if (anonymousCount > 0) {
        const li = document.createElement('li');
        li.className = 'ranking-item';
        li.style.borderTop = "1px dashed #444"; 
        li.style.marginTop = "5px";
        li.style.paddingTop = "12px";
        
        li.innerHTML = `
            <div>
                <span class="ranking-rank"></span>
                <span class="ranking-name" style="color: #aaa;">익명</span>
            </div>
            <span class="ranking-count" style="color: #aaa;">${anonymousCount}개</span>
        `;
        
        li.addEventListener('click', () => openUserModal("익명"));
        rankingList.appendChild(li);
    }
}

let currentCategory = "기타";
rawData.split('\n').forEach(line => {
let text = line.trim();
if (!text || text.includes('─')) return;
if (text.startsWith('[') && text.endsWith(']')) {
currentCategory = text.slice(1, -1);
return;
}
const firstSpaceIndex = text.indexOf(' ');
if (firstSpaceIndex !== -1) {
const prefix = text.substring(0, firstSpaceIndex).trim();
const word = text.substring(firstSpaceIndex + 1).trim();
addOrUpdateWord(prefix, word, currentCategory, false);
}
});

let dataList = Array.from(dataMap.values());

onSnapshot(collection(db, "words"), (snapshot) => {
    snapshot.docChanges().forEach((change) => {
        // 데이터가 새로 추가되거나 수정되었을 때
        if (change.type === "added" || change.type === "modified") {
            const data = change.doc.data();
            
            // 초성이나 단어가 비어있으면 무시
            if (!data.prefix || !data.word) return; 
            
            const displayTag = `${data.category || "기타"}`;
            
            // 로컬 데이터 맵에 단어 추가 또는 업데이트
            addOrUpdateWord(data.prefix, data.word, displayTag, true, data.nickname);

            // 🚀 새로 추가된 데이터일 때만 랭킹 카운트 계산
            if (change.type === "added" && data.nickname) {
                if (data.nickname === "익명") {
                    anonymousCount++; // 익명 유저 횟수 증가
                } else {
                    const currentCount = userCounts.get(data.nickname) || 0;
                    userCounts.set(data.nickname, currentCount + 1); // 특정 닉네임 횟수 증가
                }
            }
        }
    });

    // 맵 데이터를 배열로 변환해서 검색용 리스트 업데이트
    dataList = Array.from(dataMap.values());
    
    // UI에 바뀐 랭킹 바로 반영
    updateRankingUI();

    // 사용자가 현재 검색 중이라면 검색 결과 화면도 즉시 갱신
    const currentQuery = document.getElementById('searchInput').value;
    if(currentQuery) renderResults(currentQuery);
});

document.getElementById('addBtn').addEventListener('click', async () => {
    let nickname = document.getElementById('addNickname').value.trim(); 
    
    const prefix = document.getElementById('addPrefix').value.replace(/\s/g, '');
    const word = document.getElementById('addWord').value.replace(/\s/g, '');
    const category = document.getElementById('addCategory').value;

    if (!prefix || !word) { alert("초성과 단어를 모두 입력해주세요!"); return; }
    if (!category) { alert("범주를 선택해주세요!"); return; }
    if (!nickname) nickname = "익명";

    try {
        await addDoc(collection(db, "words"), {
            category: category, 
            prefix: prefix,
            word: word,
            nickname: nickname,
            timestamp: new Date()
        });
        alert(`'${word}' 단어가 성공적으로 등록되었습니다!`);
        document.getElementById('addPrefix').value = '';     
        document.getElementById('addWord').value = '';       
        document.getElementById('addCategory').value = '';
    } catch (e) {
        alert("단어 추가에 실패했습니다.");
    }
});

const searchInput = document.getElementById('searchInput');
const resultList = document.getElementById('resultList');

function renderResults(query) {
resultList.innerHTML = '';
const lowerQuery = query.toLowerCase().replace(/\s/g, ''); 

if (lowerQuery.length === 0) {
resultList.innerHTML = '<div class="empty-msg">검색어를 입력하면 결과가 나타납니다.</div>';
return;
}

const filtered = dataList.filter(item => (item.prefix || "").includes(lowerQuery) || (item.words || "").includes(query));

filtered.sort((a, b) => {
const lenA = (a.prefix || "").replace(/\s/g, '').length;
const lenB = (b.prefix || "").replace(/\s/g, '').length;
if (lenA !== lenB) return lenA - lenB;
if (a.isUser !== b.isUser) return a.isUser ? 1 : -1; 
return (a.prefix || "").localeCompare(b.prefix || "");
});

if (filtered.length === 0) {
resultList.innerHTML = '<div class="empty-msg">일치하는 단어가 없습니다.</div>';
return;
}

filtered.forEach(item => {
const li = document.createElement('li');
li.className = 'result-item';
const categoryClass = item.isUser ? 'category user-added' : 'category';
li.innerHTML = `
                   <span class="prefix">${item.prefix}</span>
                   <span class="words">${item.words}</span>
                   <span class="${categoryClass}">${item.category}</span>
               `;
resultList.appendChild(li);
});
}

searchInput.addEventListener('input', (e) => renderResults(e.target.value));
